name: bqopd_core
description: "Core services, repositories, and config for the bqopd platform."
version: 1.0.0
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # --- Inter-Package Dependencies ---
  bqopd_models: any

  # --- External Dependencies ---
  cloud_firestore: ^5.4.3
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.4
  cloud_functions: ^5.1.0
  flutter_google_places_sdk: ^0.3.3
  provider: ^6.1.2
  go_router: ^14.2.0
  http: ^1.1.0